<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Salotti Opina</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(138, 43, 226, 0.25), transparent 30%),
        linear-gradient(135deg, #0b0712, #120a1d, #09060f);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
    }

    .chat-container {
      width: 100%;
      max-width: 950px;
      height: 90vh;
      background: rgba(16, 10, 25, 0.95);
      border: 1px solid rgba(180, 120, 255, 0.25);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 25px rgba(128, 0, 255, 0.25),
        0 0 80px rgba(80, 0, 160, 0.18);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(190, 150, 255, 0.15);
      background: linear-gradient(90deg, rgba(88, 28, 135, 0.4), rgba(20, 10, 35, 0.8));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bot-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7b2ff7, #c86bff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(171, 91, 255, 0.5);
    }

    .header-text h1 {
      font-size: 22px;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .header-text p {
      font-size: 13px;
      color: #cdb7ff;
    }

    .status {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(123, 47, 247, 0.15);
      border: 1px solid rgba(200, 107, 255, 0.25);
      color: #dfc8ff;
      font-size: 13px;
    }

    .chat-box {
      flex: 1;
      padding: 22px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar {
      width: 10px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(157, 78, 221, 0.35);
      border-radius: 10px;
    }

    .message {
      max-width: 78%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 15px;
      animation: fadeUp 0.28s ease;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bot-message {
      align-self: flex-start;
      background: linear-gradient(135deg, rgba(123, 47, 247, 0.23), rgba(72, 24, 110, 0.35));
      border: 1px solid rgba(205, 183, 255, 0.12);
      color: #f4ecff;
      border-top-left-radius: 6px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
    }

    .user-message {
      align-self: flex-end;
      background: linear-gradient(135deg, #8a2be2, #b14cff);
      color: white;
      border-top-right-radius: 6px;
      box-shadow: 0 10px 25px rgba(138, 43, 226, 0.28);
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d8beff;
      animation: blink 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    .quick-commands {
      padding: 0 22px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.03);
    }

    .quick-btn {
      background: rgba(123, 47, 247, 0.12);
      color: #e7d8ff;
      border: 1px solid rgba(200, 107, 255, 0.18);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.25s;
      font-size: 13px;
    }

    .quick-btn:hover {
      transform: translateY(-2px);
      background: rgba(140, 65, 255, 0.22);
      box-shadow: 0 8px 20px rgba(128, 0, 255, 0.18);
    }

    .input-area {
      padding: 16px 20px 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(190, 150, 255, 0.12);
      background: rgba(10, 6, 16, 0.65);
    }

    .input-area input {
      flex: 1;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(180, 120, 255, 0.22);
      outline: none;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-size: 15px;
      transition: 0.25s;
    }

    .input-area input::placeholder {
      color: #b89cdf;
    }

    .input-area input:focus {
      border-color: #b86cff;
      box-shadow: 0 0 0 4px rgba(184, 108, 255, 0.12);
    }

    .input-area button {
      padding: 0 22px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #8a2be2, #c86bff);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 10px 25px rgba(138, 43, 226, 0.28);
    }

    .input-area button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 30px rgba(170, 70, 255, 0.34);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.25;
        transform: scale(0.85);
      }
      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 700px) {
      .chat-container {
        height: 95vh;
      }

      .message {
        max-width: 90%;
      }

      .chat-header {
        padding: 16px;
      }

      .header-text h1 {
        font-size: 18px;
      }

      .status {
        display: none;
      }

      .input-area {
        padding: 14px;
      }

      .input-area button {
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="header-left">
        <div class="bot-avatar">🤖</div>
        <div class="header-text">
          <h1>Bot Salotti Opina</h1>
          <p>Engraçado, criativo e pronto pra falar da equipe e dos professores</p>
        </div>
      </div>
      <div class="status">Online agora</div>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message bot-message">
        Salve! Eu sou o <strong>Bot Salotti Opina</strong> 😎<br><br>
        Você pode perguntar sobre:
        <br>• Vinicius
        <br>• Clara
        <br>• Carlos
        <br>• Ryan
        <br>• Guilherme
        <br>• Lucas
        <br>• Yuuta
        <br>• Patrick
        <br>• João Nicolas
        <br>• João
        <br>• Victor
        <br>• Romário
        <br>• Xavier
        <br>• Davi
      </div>
    </div>

    <div class="quick-commands">
      <button class="quick-btn" onclick="enviarPerguntaRapida('vinicius')">Vinicius</button>
      <button class="quick-btn" onclick="enviarPerguntaRapida('clara')">Clara</button>
      <button class="quick-btn" onclick="enviarPerguntaRapida('romario')">Romário</button>
      <button class="quick-btn" onclick="enviarPerguntaRapida('ryan')">Ryan</button>
      <button class="quick-btn" onclick="enviarPerguntaRapida('victor')">Victor</button>
      <button class="quick-btn" onclick="enviarPerguntaRapida('davi')">Davi</button>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Digite um nome ou faça uma pergunta..."
        onkeydown="if(event.key === 'Enter') responder()"
      />
      <button onclick="responder()">Enviar</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    function adicionarMensagem(texto, tipo) {
      const mensagem = document.createElement("div");
      mensagem.classList.add("message", tipo);
      mensagem.innerHTML = texto;
      chatBox.appendChild(mensagem);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function mostrarDigitando() {
      const typing = document.createElement("div");
      typing.classList.add("message", "bot-message");
      typing.id = "typingMessage";
      typing.innerHTML = `
        <div class="typing">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removerDigitando() {
      const typing = document.getElementById("typingMessage");
      if (typing) typing.remove();
    }

    function respostaAleatoria(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function gerarResposta(input) {
      const texto = input.toLowerCase().trim();

      if (texto.includes("vinicius") || texto.includes("vini")) {
        return respostaAleatoria([
          "Vinicius? Front-end insano… mas faz tudo 😎🔥<br>Mais conhecido como <strong>vinifullstack</strong>.",
          "Vinicius é aquele tipo de cara que mexe no front, no back e ainda quer deixar tudo bonito 💻🔥",
          "Vinicius? O homem do front-end insano… mas quando precisa, faz de tudo mesmo 😏"
        ]);
      }

      if (texto.includes("clara")) {
        return respostaAleatoria([
          "Clara? Aluna destaque… depois do Vinicius, claro 😎✨",
          "Se tiver dúvida, só perguntar pra Clara que ela resolve 📚💡",
          "Organizada, inteligente e sempre ajuda geral 👑",
          "Clara não erra… ela só testa hipóteses avançadas 😏"
        ]);
      }

      if (texto.includes("carlos")) {
        return respostaAleatoria([
          "Carlos? Engraçado e animado, impossível ficar triste perto dele 😆🔥",
          "Carlos levanta o clima da equipe só de aparecer 😂",
          "Se o ambiente tá leve e bom, tem chance do Carlos estar por perto 😎"
        ]);
      }

      if (texto.includes("ryan")) {
        return respostaAleatoria([
          "Ryan arrasa no back-end. Inteligente, sincero e direto ao ponto 💻🧠",
          "Ryan é o cérebro do back-end… o cara resolve sem enrolar 🔥",
          "Back-end com Ryan é coisa séria. O homem pensa e já entrega 😎"
        ]);
      }

      if (texto.includes("guilherme")) {
        return respostaAleatoria([
          "Guilherme domina o front e ainda ajuda todo mundo com sorriso no rosto 😄✨",
          "Front-end na mão do Guilherme já vem com estilo e suporte incluso 🎨🔥",
          "O cara manda no front e ainda é gente boa demais 😎"
        ]);
      }

      if (texto.includes("lucas")) {
        return respostaAleatoria([
          "Lucas? Back-end com ele mesmo. Inteligente e engraçado 😎⚙️",
          "Lucas é daqueles que chega tranquilo e resolve tudo no back-end 💻",
          "Inteligência + resenha + código. Esse é o Lucas 🔥"
        ]);
      }

      if (texto.includes("yuuta")) {
        return respostaAleatoria([
          "Yuuta é top, engraçado e amigo de todo mundo 🤝🔥",
          "Se a vibe tá boa, o Yuuta provavelmente tá no meio 😄",
          "Yuuta: carisma alto e amizade com geral desbloqueada 😎"
        ]);
      }

      if (texto.includes("patrick")) {
        return respostaAleatoria([
          "Patrick é sábio e legal. Sempre passa uma visão boa 🧠😎",
          "Patrick tem aquela energia de quem pensa antes e ajuda depois 📚🔥",
          "Calmo, inteligente e gente boa. Patrick é equilíbrio puro 😌"
        ]);
      }

      if (texto.includes("joao nicolas") || texto.includes("joão nicolas")) {
        return respostaAleatoria([
          "João Nicolas é legal e bom pra conversar 🤝",
          "Trocar ideia com João Nicolas é sempre tranquilo e daora 😎",
          "Gente boa demais e com papo bom. Respeito total 🔥"
        ]);
      }

      if (
        texto === "joao" ||
        texto === "joão" ||
        texto.includes("joao professor") ||
        texto.includes("joão professor")
      ) {
        return respostaAleatoria([
          "Professor João? Divertido demais. Aula com ele é aprendizado + entretenimento 🎉😆",
          "João ensina e ainda deixa a sala mais leve. Aí é elite 😎",
          "Se a aula tá boa e divertida, pode ter dedo do professor João 😄"
        ]);
      }

      if (
        texto.includes("victor") ||
        texto.includes("vitor") ||
        texto.includes("victor aluno") ||
        texto.includes("vitor aluno")
      ) {
        return respostaAleatoria([
          "Victor é bem legal, gente boa mesmo 😎",
          "Victor é aquele cara tranquilo e daora que deixa o ambiente melhor 🔥",
          "Resenha boa e personalidade firme. Esse é o Victor 😏"
        ]);
      }

      if (texto.includes("romario") || texto.includes("romário") || texto.includes("matematica") || texto.includes("matemática")) {
        return respostaAleatoria([
          "Romário? Esse aí resolve conta até dormindo 😴📐",
          "Se você entendeu matemática com o Romário, parabéns… evoluiu muito 🧠🔥",
          "Dizem que ele sonha com equação e acorda corrigindo conta 😎",
          "Romário é daquele jeito: passou matéria, já virou desafio matemático ⚡"
        ]);
      }

      if (texto.includes("xavier")) {
        return respostaAleatoria([
          "Xavier é amigo do povo e gente fina demais 🤝🔥",
          "Se precisar de ajuda, o Xavier cola junto 😎",
          "Popular não… respeitado 😏"
        ]);
      }

      if (texto.includes("davi")) {
        return respostaAleatoria([
          "Davi é brabo. Tem resposta pra tudo 😳🔥",
          "Sabe o que dizer na hora certa. O cara é diferenciado 😎",
          "Se travar numa situação, chama o Davi que ele desenrola 🧠"
        ]);
      }

      if (texto.includes("professor")) {
        return respostaAleatoria([
          "Professor bom é aquele que ensina e ainda faz a sala prestar atenção 😎",
          "Tem professor que explica… e tem professor que marca. Esses são os brabos 🔥",
          "Professor insano é outro nível, muda até o clima da aula 😄"
        ]);
      }

      if (texto.includes("integrantes") || texto.includes("equipe") || texto.includes("grupo")) {
        return "Esse grupo tem talento, resenha e muita capacidade 😎🔥<br>Tem front, back, criatividade e personalidade. Equipe forte.";
      }

      if (texto.includes("salotti")) {
        return respostaAleatoria([
          "Salotti é caos, talento e história tudo junto 😎",
          "Salotti não é só escola… é experiência desbloqueada 🔥",
          "Aqui tem aprendizado, correria e momentos lendários 😆"
        ]);
      }

      return respostaAleatoria([
        "Não entendi muito bem… mas gostei da confiança 😎",
        "Essa foi diferente, manda de outro jeito que eu respondo 😆",
        "Meu sistema quase travou com essa, tenta outro nome aí 👀",
        "Pergunta interessante… reformula que eu te ajudo 🔥"
      ]);
    }

    function responder() {
      const texto = userInput.value.trim();
      if (texto === "") return;

      adicionarMensagem(texto, "user-message");
      userInput.value = "";

      mostrarDigitando();

      setTimeout(() => {
        removerDigitando();
        const resposta = gerarResposta(texto);
        adicionarMensagem(resposta, "bot-message");
      }, 900);
    }

    function enviarPerguntaRapida(texto) {
      userInput.value = texto;
      responder();
    }
  </script>
</body>
</html>
