<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inicial</title>
    <link rel="stylesheet" href="../css/inicial.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="começo">
        <img
          src="../img/icone_inicial_header.png"
          alt="logo-da-inicial-do-header"
          class="inicial"
        />
        <h1>Salotti <span class="span-titulo">Opina</span></h1>
      </div>
      <div class="meio">
        <button class="btn1">
          <img
            src="../img/icone_inicial_header.png"
            alt="icone-para-ir-para-tela-inicial"
          />
          Não se trata de uma questão de...
        </button>
        <button class="btn2">
          <img
            src="../img/icone_pessoas_header.png"
            alt="icone-para-ir-para-tela-professores"
          />
          Professores
        </button>
        <button class="btn3">
          <img
            src="../img/icone-predio.png"
            alt="icone-para-ir-para-tela-setores"
          />
          Categorias
        </button>
      </div>
      <div class="fim">
        <button class="btn4">
          <img
            src="../img/icone-entrar.png"
            alt="icone-para-ir-para-tela-cadastro"
          />
          Entrar
        </button>
      </div>
      <hr />
    </header>

    <main>
      <div class="parte-de-cima">
        <div class="parte1">
          <div class="circulo"></div>
          <h2>O NOVO PADRÃO EM FEEDBACK ESCOLAR</h2>
        </div>
        <h1 class="titulo-parte-cima">
          A Voz da Escola,<span class="span-parte-cima">
            <br />
            Elevada.</span
          >
        </h1>
        <h3 class="h3-parte-cima">
          Salotti Opina é uma plataforma definitiva para avaliações <br />
          institucionais. Uma interface premium projetada para conectar <br />
          alunos, professores e administração com clareza e sofisticação.
        </h3>
        <div class="butoes-cima">
          <button class="button1-cima">Painel de Controle de Acesso <span class="seta">⇨</span></button>
          <button class="button2-cima">Explorar</button>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
